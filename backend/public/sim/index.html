<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARGOS — Crisis Simulator</title>
    <style>
      * { box-sizing: border-box; }
      :root {
        --bg: #0c0d12;
        --panel: #14161d;
        --panel-2: #1b1d26;
        --border: rgba(255, 255, 255, 0.08);
        --accent: #ff6127;
        --accent-soft: rgba(255, 97, 39, 0.15);
        --text: #f1f3f8;
        --muted: #8a8f9d;
        --success: #4ade80;
        --danger: #ef4444;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
        background: radial-gradient(circle at top, rgba(255, 97, 39, 0.12), transparent 38%), var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 8px;
        letter-spacing: 0.04em;
      }
      .sub {
        color: var(--muted);
        font-size: 14px;
        margin: 0 0 32px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        padding: 4px 10px;
        border-radius: 4px;
        background: var(--accent-soft);
        color: var(--accent);
      }
      .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
      .dot.live { background: var(--success); }
      .dot.dead { background: var(--danger); }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
      }
      .panel h2 {
        font-size: 16px;
        margin: 0 0 16px;
        letter-spacing: 0.02em;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }
      .crisis-btn {
        background: var(--panel-2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s ease;
        text-align: left;
      }
      .crisis-btn:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
        transform: translateY(-1px);
      }
      .crisis-btn .label { display: block; }
      .crisis-btn .meta { display: block; font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 4px; letter-spacing: 0.04em; }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }
      .field label {
        font-size: 10px;
        letter-spacing: 0.18em;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
      }
      .field input, .field select, .field textarea {
        background: #0b0c11;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
      }
      .field input:focus, .field select:focus, .field textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .footer-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 20px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .log {
        max-height: 240px;
        overflow-y: auto;
        font-family: "SF Mono", "JetBrains Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.6;
        background: #0b0c11;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--muted);
      }
      .log .entry { white-space: pre-wrap; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
      .log .entry:last-child { border-bottom: 0; }
      .log .entry.ok { color: var(--success); }
      .log .entry.err { color: var(--danger); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="badge"><span class="dot"></span> SIMULATION ENVIRONMENT</span>
      <h1 style="margin-top: 16px">Crisis Trigger Simulator</h1>
      <p class="sub">Replaces the AI/edge classifier for testing. Each button broadcasts a crisis to every connected client.</p>

      <div class="panel">
        <h2>Crisis Type</h2>
        <div class="grid" id="crisis-buttons">
          <button class="crisis-btn" data-type="fire" data-severity="4" data-desc="Smoke detected on Floor 3 — East Wing">
            <span class="label">Fire</span>
            <span class="meta">Severity 4 · auto-fill</span>
          </button>
          <button class="crisis-btn" data-type="medical" data-severity="4" data-desc="Guest unconscious in Lobby">
            <span class="label">Medical</span>
            <span class="meta">Severity 4 · auto-fill</span>
          </button>
          <button class="crisis-btn" data-type="security" data-severity="5" data-desc="Armed individual reported in Atrium">
            <span class="label">Security</span>
            <span class="meta">Severity 5 · auto-fill</span>
          </button>
          <button class="crisis-btn" data-type="stampede" data-severity="5" data-desc="Crowd surge near Exit B">
            <span class="label">Stampede</span>
            <span class="meta">Severity 5 · auto-fill</span>
          </button>
          <button class="crisis-btn" data-type="structural" data-severity="4" data-desc="Visible crack reported on Floor 5">
            <span class="label">Structural</span>
            <span class="meta">Severity 4 · auto-fill</span>
          </button>
          <button class="crisis-btn" data-type="smoke" data-severity="3" data-desc="Smoke alarm on Floor 2 — kitchen">
            <span class="label">Smoke</span>
            <span class="meta">Severity 3 · auto-fill</span>
          </button>
          <button class="crisis-btn" data-type="flood" data-severity="3" data-desc="Burst pipe on Floor 1 — restroom">
            <span class="label">Flood</span>
            <span class="meta">Severity 3 · auto-fill</span>
          </button>
        </div>
      </div>

      <div class="panel">
        <h2>Custom Trigger</h2>
        <form id="custom-form">
          <div class="row">
            <div class="field">
              <label for="custom-type">Crisis Type</label>
              <select id="custom-type" name="crisis_type" required>
                <option value="fire">Fire</option>
                <option value="medical">Medical</option>
                <option value="security">Security</option>
                <option value="stampede">Stampede</option>
                <option value="structural">Structural</option>
                <option value="smoke">Smoke</option>
                <option value="flood">Flood</option>
              </select>
            </div>
            <div class="field">
              <label for="custom-severity">Severity (1–5)</label>
              <input id="custom-severity" name="severity" type="number" min="1" max="5" value="4" required />
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="custom-zone">Zone</label>
              <input id="custom-zone" name="zone" type="text" value="Floor 3 — East Wing" required />
            </div>
            <div class="field">
              <label for="custom-floor">Floor</label>
              <input id="custom-floor" name="floor" type="text" value="3" />
            </div>
          </div>
          <div class="field">
            <label for="custom-desc">Description</label>
            <textarea id="custom-desc" name="description" rows="2" required>Custom crisis triggered from the simulator.</textarea>
          </div>
          <button type="submit" class="crisis-btn" style="width: 100%; text-align: center; background: var(--accent); color: #1f120b; border: none">
            Trigger Custom Crisis
          </button>
        </form>
      </div>

      <div class="panel">
        <h2>Activity Log</h2>
        <div class="footer-bar">
          <span class="status"><span id="conn-dot" class="dot dead"></span> <span id="conn-text">connecting…</span></span>
          <span class="status">Endpoint <code style="color: var(--text)">/api/v1/sim</code></span>
        </div>
        <div class="log" id="log"></div>
      </div>
    </div>

    <script>
      const apiBase = '/api/v1/sim';
      const logEl = document.getElementById('log');
      const dotEl = document.getElementById('conn-dot');
      const connEl = document.getElementById('conn-text');

      function logLine(msg, cls) {
        const entry = document.createElement('div');
        entry.className = 'entry' + (cls ? ' ' + cls : '');
        entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        logEl.prepend(entry);
      }

      async function trigger(payload) {
        try {
          const res = await fetch(apiBase + '/trigger', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const json = await res.json();
          if (!res.ok) {
            logLine('TRIGGER FAILED · ' + (json.error?.message || res.statusText), 'err');
            return;
          }
          logLine('TRIGGERED ' + payload.crisis_type.toUpperCase() + ' · ' + json.crisis_id + ' · delivered to ' + json.subscribers + ' subscribers', 'ok');
        } catch (err) {
          logLine('TRIGGER FAILED · ' + (err && err.message ? err.message : 'network error'), 'err');
        }
      }

      document.querySelectorAll('#crisis-buttons .crisis-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          trigger({
            crisis_type: btn.dataset.type,
            severity: Number(btn.dataset.severity),
            description: btn.dataset.desc,
            zone: 'Floor 3 — East Wing',
            floor: '3',
          });
        });
      });

      document.getElementById('custom-form').addEventListener('submit', (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const data = Object.fromEntries(new FormData(form).entries());
        trigger({
          crisis_type: data.crisis_type,
          severity: Number(data.severity),
          zone: data.zone,
          floor: data.floor || undefined,
          description: data.description,
        });
      });

      function connectStream() {
        const es = new EventSource(apiBase + '/events/stream');
        es.addEventListener('ready', () => {
          dotEl.className = 'dot live';
          connEl.textContent = 'connected to broadcast';
          logLine('SSE STREAM CONNECTED');
        });
        es.addEventListener('crisis.detected', (e) => {
          const data = JSON.parse(e.data);
          logLine('CRISIS BROADCAST · ' + data.crisis_type.toUpperCase() + ' · ' + data.zone);
        });
        es.onerror = () => {
          dotEl.className = 'dot dead';
          connEl.textContent = 'reconnecting…';
        };
      }

      connectStream();
    </script>
  </body>
</html>
